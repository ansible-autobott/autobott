---
#============================================================================================================
# Rsync Role Handlers
#============================================================================================================

- name: Restart rsync
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  listen: restart rsync
  loop: "{{ rsync_config.services | default(['rsync']) }}"

- name: Reload rsync
  # rsyncd re-reads its config per connection, so a reload is effectively a restart
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  listen: reload rsync
  loop: "{{ rsync_config.services | default(['rsync']) }}"
