---
#============================================================================================================
# Rsync daemon
#============================================================================================================
- name: Main Rsync block
  tags:
    - rsync
    - untagged
  when:
    - run_role_rsync | bool
  block:
    - name: Set merged rsync configuration
      ansible.builtin.set_fact:
        rsync_config: "{{ rsync_defaults | combine(rsync, recursive=true) }}"

    - name: Install rsync package
      ansible.builtin.apt:
        name:
          - rsync
        state: present
        update_cache: true

    - name: Enable rsync daemon defaults
      ansible.builtin.template:
        src: rsync.default.j2
        dest: /etc/default/rsync
        mode: "0644"
      notify: restart rsync

    - name: Configure rsync daemon
      ansible.builtin.template:
        src: rsyncd.conf.j2
        dest: /etc/rsyncd.conf
        mode: "0644"
      notify: restart rsync

    - name: Write rsync secrets file
      ansible.builtin.template:
        src: rsyncd.secrets.j2
        dest: /etc/rsyncd.secrets
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: restart rsync

    - name: Mask rsync socket activation (use always-on service)
      ansible.builtin.systemd:
        name: rsync.socket
        enabled: false
        state: stopped
        masked: true
      failed_when: false   # socket unit may be absent on some versions

    - name: Enable and start rsync daemon
      ansible.builtin.service:
        name: rsync
        enabled: true
        state: started

    - name: Create module directories
      ansible.builtin.file:
        state: directory
        path: "{{ item.path }}"
        owner: "{{ item.dir_owner | default(rsync_config.module_defaults.dir_owner) }}"
        group: "{{ item.dir_group | default(rsync_config.module_defaults.dir_group) }}"
        mode: "{{ item.dir_mode | default(rsync_config.module_defaults.dir_mode) }}"
      loop: "{{ rsync_config.modules }}"
      when: item.path is defined and item.path != ''
