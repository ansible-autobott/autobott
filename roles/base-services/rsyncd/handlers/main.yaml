---
#============================================================================================================
# Rsyncd Role Handlers
#============================================================================================================

- name: Restart rsyncd
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  listen: restart rsyncd
  loop: "{{ rsyncd_config.services | default(['rsync']) }}"

- name: Reload rsyncd
  # rsyncd re-reads its config per connection, so a reload is effectively a restart
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  listen: reload rsyncd
  loop: "{{ rsyncd_config.services | default(['rsync']) }}"
